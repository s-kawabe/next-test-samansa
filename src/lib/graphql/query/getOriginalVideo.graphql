query getOriginalVideo($id: ID!) {
  originalVideo(id: $id) {
    id
    title
    description
    landscapeThumbnail
    likeNum
    duration {
      minutes
      seconds
    }
    categories {
      id
      name
      videos {
        id
        title
        landscapeThumbnail
        likeNum
        duration {
          minutes
          seconds
        }
      }
    }
  }
}
